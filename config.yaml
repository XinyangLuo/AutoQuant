# AutoQuant 全局配置
# 阈值和 Agent 参数统一管理。
# Pipeline 和回测参数已下沉到各因子目录下的 config.yaml（per-factor config）。
# 各模块通过 backtest.config_loader 读取阈值。

# ---------------------------------------------------------------------------
# 阈值（单一事实来源）
# ---------------------------------------------------------------------------
thresholds:

  # 因子评估参考阈值（admission 人工审核用）
  admission:
    min_rankicir: 0.25
    min_ic_positive_ratio: 0.52
    max_turnover: 0.50
    max_corr: 0.85
    primary_horizon: 20
    ret_type: open
    exclude_limit_up: true

    # Ridge R² 分档阈值（step8）
    ridge_r2:
      pure_alpha_max: 0.2
      smart_beta_max: 0.7
      # R² < 0.2            → pure_alpha（正交 alpha，入库）
      # 0.2 ≤ R² < 0.7      → smart_beta（部分风格暴露，入库）
      # R² ≥ 0.7            → reject（风格克隆，拒绝）

    # 残差 ICIR 增量信息检查（新因子的最后一道入库门控）
    residual_icir:
      min_annual_icir: 0.05
      min_abs_ic_mean: 0.001
      horizons: [1, 5, 20]
      ridge_alpha: 1.0

  # Pipeline 各 step 自动门控阈值
  pipeline:
    # step1: 覆盖率检查
    coverage:
      max_missing_rate_pv: 0.2
      max_missing_rate_fin: 0.30

    # step3: ICIR 检查
    icir:
      min_abs_ic: 0.01
      min_annual_icir: 1.0
      min_ic_tstat: 2.0
      min_ic_positive_ratio: 0.55

    # step4: 单调性检查
    monotonicity:
      min_monotonicity: 0.7

    # step6: 简单回测
    simple_backtest:
      min_sharpe: 0.8
      min_annual_return: 0.10
      max_max_drawdown: 0.5
      min_calmar: 0.5
      max_annual_turnover: 50.0

    # step7: 详细回测
    detailed_backtest:
      min_sharpe: 0.4
      min_annual_return: 0.08
      min_calmar: 0.5

# ---------------------------------------------------------------------------
# Agent 投研配置
# ---------------------------------------------------------------------------
agent:
  # LLM
  model: deepseek-chat
  max_tokens: 4096
  temperature_hypothesis: 0.7
  temperature_code: 0.3

  # 运行
  max_rounds: 10
  start_date: "20160101"
  end_date: "20251231"
  output_dir: results/agent/run_001

  # 因子 ID 命名
  factor_id_prefix: f_auto
